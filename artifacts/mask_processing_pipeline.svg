<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='300'>
  <rect width='100%' height='100%' fill='white'/>
  <text x='600' y='35' text-anchor='middle' font-size='24' font-family='Arial'>AttentionMask Handling Flow (Infer Kernel Branch)</text>
  <rect x='30' y='100' width='200' height='90' fill='#f6f6f6' stroke='#333'/>
  <text x='130' y='135' text-anchor='middle' font-size='14'>1) ComputeParamBatch</text>
  <text x='130' y='160' text-anchor='middle' font-size='13'>(mask params setup)</text>
  <rect x='260' y='100' width='200' height='90' fill='#f6f6f6' stroke='#333'/>
  <text x='360' y='135' text-anchor='middle' font-size='14'>2) ComputeParamS1</text>
  <text x='360' y='160' text-anchor='middle' font-size='13'>(skip invalid rows)</text>
  <rect x='490' y='100' width='200' height='90' fill='#f6f6f6' stroke='#333'/>
  <text x='590' y='135' text-anchor='middle' font-size='14'>3) ComputeS2LoopInfo</text>
  <text x='590' y='160' text-anchor='middle' font-size='13'>(clip K window)</text>
  <rect x='720' y='100' width='200' height='90' fill='#f6f6f6' stroke='#333'/>
  <text x='820' y='135' text-anchor='middle' font-size='14'>4) ComputeMaskOffset</text>
  <text x='820' y='160' text-anchor='middle' font-size='13'>(delta → offset)</text>
  <rect x='950' y='100' width='220' height='90' fill='#f6f6f6' stroke='#333'/>
  <text x='1060' y='135' text-anchor='middle' font-size='14'>5) AttenMaskCopyIn</text>
  <text x='1060' y='160' text-anchor='middle' font-size='13'>(load compressed mask)</text>
</svg>
